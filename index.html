<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>РЕДИБРОКЕР</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="reference-stage" aria-label="РЕДИБРОКЕР">
    <img class="reference-image" src="reference-page.png" alt="Квиз кредитного брокера РЕДИБРОКЕР">
    <button class="hotspot hotspot-cta" aria-label="Пройти квиз"></button>
    <div class="quiz-hotspots" aria-label="Варианты ответа">
      <button data-answer="Плохая кредитная история" aria-label="Плохая кредитная история"></button>
      <button data-answer="Есть просрочки или долги" aria-label="Есть просрочки или долги"></button>
      <button data-answer="Банки уже отказывали" aria-label="Банки уже отказывали"></button>
      <button data-answer="Нужна крупная сумма" aria-label="Нужна крупная сумма"></button>
      <button data-answer="Хочу рефинансирование" aria-label="Хочу рефинансирование"></button>
    </div>
  </main>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" data-close aria-label="Закрыть">×</button>
      <div class="modal-check">✓</div>
      <h2 id="modal-title">Ответы теста сохранены</h2>
      <p>Оставьте контакт, чтобы специалисты нашей команды могли уточнить вашу ситуацию.</p>
      <form id="lead-form">
        <label>Имя<input required name="name" placeholder="Как к вам обращаться"></label>
        <label>Телефон или Telegram<input required name="contact" placeholder="+7 900 000-00-00 или @username"></label>
        <button type="submit">Получить консультацию</button>
      </form>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
